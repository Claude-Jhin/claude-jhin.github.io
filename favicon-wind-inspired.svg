<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-labelledby="title desc">
  <title id="title">Wind Inspired Cold Icon</title>
  <desc id="desc">A cold, minimal icon inspired by a tiny wind-like game symbol, rendered in white and blue on a deep navy background.</desc>
  <defs>
    <linearGradient id="bg" x1="8" y1="6" x2="54" y2="58" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#08111d"/>
      <stop offset="0.6" stop-color="#10243a"/>
      <stop offset="1" stop-color="#1a3f69"/>
    </linearGradient>
    <radialGradient id="glow" cx="18" cy="14" r="30" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#eef7ff" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#eef7ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="topFacet" x1="19" y1="14" x2="47" y2="29" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset="0.58" stop-color="#c8ddff"/>
      <stop offset="1" stop-color="#7da9ef"/>
    </linearGradient>
