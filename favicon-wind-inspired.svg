  <rect x="4" y="4" width="56" height="56" rx="16" fill="url(#bg)"/>
  <rect x="4.5" y="4.5" width="55" height="55" rx="15.5" fill="none" stroke="#8ab2e3" stroke-opacity="0.28"/>
  <rect x="4" y="4" width="56" height="56" rx="16" fill="url(#glow)"/>
  <path d="M14 17 25 17 41 31" stroke="#dcecff" stroke-opacity="0.16" stroke-width="1.4" stroke-linecap="round"/>
  <path d="M18 12 32 12 47 25" stroke="#dcecff" stroke-opacity="0.1" stroke-width="1.2" stroke-linecap="round"/>
  <g stroke="#f5f9ff" stroke-opacity="0.22" stroke-width="1" stroke-linejoin="round">
    <path d="M33 10 47 23 30 30 18 18Z" fill="url(#topFacet)"/>
    <path d="M14 29 28 29 45 43 31 43Z" fill="url(#midFacet)"/>
